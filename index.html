<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路境行旅 知識庫</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
:root{
  --bg:#F7F6F3;--surface:#fff;--sb-bg:#1C1C1E;--sb-text:#E5E5E7;
  --sb-muted:#8E8E93;--sb-hover:#2C2C2E;--sb-active:#3A3A3C;
  --accent:#4A7C59;--accent-l:#E8F2EC;--accent-h:#3D6B4A;
  --text:#1C1C1E;--muted:#6E6E73;--border:#E5E5E7;--border-s:#C7C7CC;
  --danger:#FF3B30;--warn-bg:#FFFBEB;--warn-br:#F59E0B;
  --shadow:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 20px rgba(0,0,0,.13);
  --sbw:260px;--font:'Noto Sans TC',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* ── Sidebar ── */
#sidebar{width:var(--sbw);background:var(--sb-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .25s}
.sh{padding:18px 16px 14px;border-bottom:1px solid #2C2C2E;flex-shrink:0}
.sh-logo{font-size:14px;font-weight:700;color:#fff}
.sh-sub{font-size:11px;color:var(--sb-muted);margin-top:2px}
.ss{padding:10px 12px;border-bottom:1px solid #2C2C2E;flex-shrink:0;position:relative}
.ss svg{position:absolute;left:21px;top:50%;transform:translateY(-50%);color:var(--sb-muted);pointer-events:none}
.ss input{width:100%;background:#2C2C2E;border:1px solid #3A3A3C;border-radius:6px;color:var(--sb-text);font-family:var(--font);font-size:13px;padding:6px 10px 6px 28px;outline:none}
.ss input::placeholder{color:var(--sb-muted)}
.ss input:focus{border-color:var(--accent)}
.sn{flex:1;overflow-y:auto;padding:6px 0}
.sn::-webkit-scrollbar{width:3px}
.sn::-webkit-scrollbar-thumb{background:#3A3A3C;border-radius:2px}
.snl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--sb-muted);text-transform:uppercase;padding:14px 14px 4px}
.si{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:13px;color:var(--sb-text);cursor:pointer;transition:background .12s;user-select:none;border-left:3px solid transparent}
.si:hover{background:var(--sb-hover)}
.si.active{background:var(--sb-active);color:#fff;border-left-color:var(--accent)}
.si .ar{margin-left:auto;font-size:11px;color:var(--sb-muted);transition:transform .18s;flex-shrink:0}
.si.open .ar{transform:rotate(90deg)}
.sc{display:none}
.sc.open{display:block}
.sci{display:flex;align-items:center;gap:6px;padding:6px 14px 6px 32px;font-size:12px;color:var(--sb-muted);cursor:pointer;transition:all .12s;border-left:3px solid transparent}
.sci:hover{color:var(--sb-text);background:var(--sb-hover)}
.sci.active{color:#A8D5B5;border-left-color:#4A7C59}
.sf{padding:12px;border-top:1px solid #2C2C2E;flex-shrink:0}
.seb{width:100%;padding:8px;background:transparent;border:1px solid #3A3A3C;border-radius:6px;color:var(--sb-muted);font-family:var(--font);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.seb:hover{border-color:var(--accent);color:#A8D5B5}
.seb.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Main ── */
#main{margin-left:var(--sbw);flex:1;min-height:100vh;display:flex;flex-direction:column}
.tb{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:50px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.tb-cr{font-size:13px;color:var(--muted)}
.tb-cr b{color:var(--text);font-weight:600}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.sv-btn{padding:6px 16px;border-radius:6px;background:var(--accent);color:#fff;border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;display:none;transition:background .15s}
.sv-btn:hover{background:var(--accent-h)}
.sv-ind{font-size:12px;color:var(--muted);display:none}
#sb-banner{display:none;background:var(--accent-l);border-bottom:1px solid #C5DFC9;padding:8px 32px;font-size:13px;color:var(--accent);align-items:center;gap:8px}
#sb-banner button{margin-left:auto;background:transparent;border:none;color:var(--accent);cursor:pointer;font-size:16px}

/* ── 編輯工具列 ── */
#ebar{display:none;background:var(--surface);border-bottom:2px solid var(--accent-l);padding:0;flex-direction:column}
.ebar-types{padding:10px 32px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.ebar-types .lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-right:4px;flex-shrink:0}
.ebar-hint{padding:8px 32px 10px;display:flex;gap:16px;flex-wrap:wrap}
.hint-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.hint-demo{border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600}
.ab{padding:5px 12px;border-radius:6px;border:1px solid var(--border-s);background:var(--bg);color:var(--text);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.ab:hover{background:var(--surface);border-color:var(--accent);color:var(--accent)}
.ab:active{transform:scale(.97)}
.bdg{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:700}
.bh1{background:#E8F2EC;color:#2D6A40}.bh2{background:#E8EEFF;color:#3A5FC8}
.bh3{background:#F3F3F3;color:#555}.bst{background:#EDFFF3;color:#1A7A3C}
.bnt{background:#FFFBEB;color:#92610A}.bim{background:#F0F0FF;color:#5856D6}

/* ── 內容 ── */
.cw{padding:40px 48px;max-width:820px;width:100%}
.psec{margin-bottom:52px}

/* contenteditable */
[contenteditable]{outline:none;border-radius:4px;transition:background .12s,box-shadow .12s}
[contenteditable]:focus{background:rgba(74,124,89,.06);box-shadow:0 0 0 2px rgba(74,124,89,.25)}
[contenteditable]:hover:not(:focus){background:rgba(0,0,0,.025)}

/* block wrapper */
.bw{position:relative;display:flex;align-items:flex-start;gap:0;margin:1px 0}
.bc{display:none;align-items:center;flex-shrink:0;margin-top:3px}
.bw:hover .bc{display:flex}
.cb{background:transparent;border:none;cursor:pointer;width:22px;height:22px;border-radius:4px;color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.cb:hover{background:var(--bg);color:var(--text)}
.cb.dl:hover{background:#FFF0EF;color:var(--danger)}

/* H1 - 大標題 */
.vh1-wrap{flex:1}
.vh1{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.02em;padding:2px 6px;min-height:36px;display:block;width:100%;white-space:pre-wrap}
.vh1-line{height:3px;background:linear-gradient(90deg,var(--accent),transparent);border-radius:2px;margin:4px 0 20px 6px}

/* H2 - 副標題 */
.vh2{font-size:16px;font-weight:600;color:#2D6A40;padding:2px 6px;min-height:26px;display:flex;align-items:center;gap:8px;margin-top:22px;margin-bottom:6px;flex:1;white-space:pre-wrap}
.vh2-bar{width:4px;height:17px;background:var(--accent);border-radius:2px;flex-shrink:0;margin-top:22px}

/* H3 - 小標題 */
.vh3{font-size:14px;font-weight:600;color:var(--text);padding:2px 6px 2px 28px;min-height:24px;display:block;margin-top:10px;margin-bottom:4px;flex:1;white-space:pre-wrap;position:relative}
.vh3::before{content:'◆';position:absolute;left:12px;top:3px;font-size:8px;color:var(--border-s)}

/* Step */
.vstw{display:flex;align-items:flex-start;gap:10px;padding:4px 0;flex:1}
.vsn{min-width:22px;height:22px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.vst{font-size:14px;line-height:1.7;color:var(--text);padding:1px 4px;flex:1;min-height:24px;white-space:pre-wrap}

/* Note */
.vntw{display:flex;align-items:flex-start;gap:8px;background:var(--warn-bg);border-left:3px solid var(--warn-br);padding:10px 14px;border-radius:0 6px 6px 0;margin:6px 0;flex:1}
.vnti{flex-shrink:0;font-size:14px;margin-top:1px}
.vnt{font-size:13px;color:#78580A;flex:1;padding:1px 4px;min-height:22px;white-space:pre-wrap}

/* Img */
.vimw{margin:10px 0;flex:1}
.vimw figure{border:1px solid var(--border);border-radius:8px;overflow:hidden;max-width:580px}
.vimw img{width:100%;height:auto;display:block}
.vimw figcaption{font-size:12px;color:var(--muted);padding:6px 12px;background:var(--bg);border-top:1px solid var(--border)}

/* 搜尋高亮 */
mark{background:#FFE066;color:inherit;border-radius:2px;padding:0 1px}

/* Empty / Loading */
.empty-st{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-st .ei{font-size:40px;margin-bottom:12px}
.empty-st h3{font-size:16px;font-weight:500;margin-bottom:6px;color:var(--text)}
.ld{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.sp{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal */
.mb{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.md{background:var(--surface);border-radius:12px;padding:24px;width:100%;max-width:440px;box-shadow:var(--shadow-md)}
.md h3{font-size:15px;font-weight:600;margin-bottom:14px}
.md label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.md input{width:100%;padding:9px 12px;border:1px solid var(--border-s);border-radius:7px;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);outline:none;margin-bottom:10px}
.md input:focus{border-color:var(--accent);background:var(--surface)}
.md-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn{padding:7px 16px;border-radius:6px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.bp{background:var(--accent);color:#fff}.bp:hover{background:var(--accent-h)}
.bg2{background:transparent;color:var(--muted);border:1px solid var(--border-s)}.bg2:hover{background:var(--bg)}
.ph{font-size:12px;color:var(--muted);margin:-6px 0 10px}
.pe{color:var(--danger);font-size:12px;margin-top:-6px;margin-bottom:8px;display:none}
.ua{border:2px dashed var(--border-s);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg);margin-bottom:8px}
.ua:hover{border-color:var(--accent);background:var(--accent-l)}
.ua p{font-size:13px;color:var(--muted);margin-top:6px}
.uai{font-size:28px}
.upr{max-width:100%;max-height:140px;border-radius:6px;margin-bottom:6px;border:1px solid var(--border)}
.ust{font-size:12px;color:var(--muted);margin-bottom:8px}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;background:#1C1C1E;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;display:none;align-items:center;gap:8px;box-shadow:var(--shadow-md);animation:su .2s ease}
@keyframes su{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

/* RWD */
.hbg{display:none;position:fixed;top:10px;left:10px;z-index:300;background:var(--sb-bg);border:none;color:#fff;width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:17px;align-items:center;justify-content:center}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .cw{padding:20px}
  .tb{padding:0 16px 0 52px}
  #ebar .ebar-types,#ebar .ebar-hint{padding-left:16px;padding-right:16px}
  #sb-banner{padding:8px 16px}
  .hbg{display:flex}
}
</style>
</head>
<body>
<button class="hbg" onclick="toggleSb()" aria-label="選單">☰</button>

<nav id="sidebar">
  <div class="sh"><div class="sh-logo">路境行旅文化館</div><div class="sh-sub">知識庫</div></div>
  <div class="ss">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="si" placeholder="搜尋關鍵字…" oninput="doSearch(this.value)" aria-label="搜尋">
  </div>
  <div class="sn" id="sn"><div style="padding:12px 14px;font-size:12px;color:#8E8E93">載入中…</div></div>
  <div class="sf"><button class="seb" id="ebt" onclick="toggleEdit()">✏️ <span id="ebl">進入編輯模式</span></button></div>
</nav>

<div id="main">
  <div class="tb">
    <div class="tb-cr">路境行旅 <b>知識庫</b></div>
    <div class="tb-r">
      <span class="sv-ind" id="svind"></span>
      <button class="sv-btn" id="svbtn" onclick="saveData()">💾 儲存</button>
    </div>
  </div>

  <div id="sb-banner"><span>🔍</span><span id="sbt"></span><button onclick="clearSearch()" aria-label="清除">✕</button></div>

  <div id="ebar">
    <div class="ebar-types">
      <span class="lbl">新增</span>
      <button class="ab" onclick="addBlock('h1')"><span class="bdg bh1">大標</span>大標題</button>
      <button class="ab" onclick="addBlock('h2')"><span class="bdg bh2">副標</span>副標題</button>
      <button class="ab" onclick="addBlock('h3')"><span class="bdg bh3">小標</span>小標題</button>
      <button class="ab" onclick="addBlock('step')"><span class="bdg bst">步驟</span>步驟說明</button>
      <button class="ab" onclick="addBlock('note')"><span class="bdg bnt">注意</span>注意事項</button>
      <button class="ab" onclick="addBlock('img')"><span class="bdg bim">圖片</span>插入圖片</button>
    </div>
    <div class="ebar-hint">
      <div class="hint-item"><span class="hint-demo bh1" style="background:#E8F2EC;color:#2D6A40">大標題</span>主要章節，會出現在左側目錄</div>
      <div class="hint-item"><span class="hint-demo bh2" style="background:#E8EEFF;color:#3A5FC8">副標題</span>章節內的分組</div>
      <div class="hint-item"><span class="hint-demo bh3" style="background:#F3F3F3;color:#555">小標題</span>副標題內的細項</div>
      <div class="hint-item"><span class="hint-demo bst" style="background:#EDFFF3;color:#1A7A3C">步驟</span>有編號的操作步驟</div>
      <div class="hint-item"><span class="hint-demo bnt" style="background:#FFFBEB;color:#92610A">注意</span>⚠️ 特別提醒</div>
      <div class="hint-item" style="color:#999;font-size:11px">💡 新增後直接點擊文字即可修改　↑↓ 調整順序　✕ 刪除</div>
    </div>
  </div>

  <div class="cw" id="cw"><div class="ld"><div class="sp"></div>載入中…</div></div>
</div>

<!-- 密碼 Modal -->
<div id="pwd-modal" style="display:none"><div class="mb"><div class="md">
  <h3>🔒 進入編輯模式</h3>
  <p class="ph">請輸入管理員密碼</p>
  <label>密碼</label>
  <input type="password" id="pi" placeholder="輸入密碼…" onkeydown="if(event.key==='Enter')chkPwd()">
  <div class="pe" id="pe">密碼錯誤，請再試一次</div>
  <div class="md-btns">
    <button class="btn bg2" onclick="closePwd()">取消</button>
    <button class="btn bp" onclick="chkPwd()">確認</button>
  </div>
</div></div></div>

<!-- 圖片 Modal -->
<div id="img-modal" style="display:none"><div class="mb"><div class="md">
  <h3>🖼️ 上傳圖片</h3>
  <label>說明文字（選填）</label>
  <input type="text" id="ic" placeholder="例：系統登入頁面">
  <label>選擇圖片</label>
  <div class="ua" id="ua" onclick="document.getElementById('fi').click()"
    ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
    ondragleave="this.style.borderColor=''"
    ondrop="handleDrop(event)">
    <div id="ui"><div class="uai">📷</div><p>點擊或拖曳圖片到這裡</p><p style="font-size:11px;margin-top:4px;color:#aaa">JPG、PNG、GIF，最大 10MB</p></div>
  </div>
  <div class="ust" id="us"></div>
  <input type="file" id="fi" accept="image/*" style="display:none" onchange="handleFile(this)">
  <div class="md-btns">
    <button class="btn bg2" onclick="closeImg()">取消</button>
    <button class="btn bp" onclick="confirmImg()">插入圖片</button>
  </div>
</div></div></div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
const CFG={
  BIN:'6a603f6cf5f4af5e29af2fa1',
  KEY:'$2a$10$gMxDaF3CQfAsAvbqEQpgDOmNNFmz9CXKzA7pgg0u2Lb0pMkrxVQAW',
  CLD:'db1pzd5xq',PRE:'sop_upload',PWD:'1234'
};

let blocks=[],isEdit=false,imgBid=null,upUrl='',sq='';

// ── 資料 ──
async function loadData(){
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${CFG.BIN}/latest`,{headers:{'X-Master-Key':CFG.KEY}});
    if(!r.ok)throw 0;
    const j=await r.json();
    blocks=(j.record.blocks||[]).filter(b=>b&&b.id&&b.type);
  }catch{blocks=def();toast('⚠️ 無法連線，顯示預設資料');}
  render();buildNav();
}

async function saveData(){
  setInd('saving');syncDOM();
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${CFG.BIN}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':CFG.KEY},
      body:JSON.stringify({blocks})
    });
    if(!r.ok)throw 0;
    setInd('saved');toast('✅ 已儲存');buildNav();
  }catch{setInd('err');toast('❌ 儲存失敗');}
}

function syncDOM(){blocks.forEach(b=>{const e=document.getElementById('t-'+b.id);if(e)b.text=e.innerText.trim();});}
function setInd(s){
  const e=document.getElementById('svind');
  e.style.display=s?'':'none';
  e.style.color=s==='saving'?'var(--accent)':s==='saved'?'#2D7D46':'var(--danger)';
  e.textContent=s==='saving'?'儲存中…':s==='saved'?'✓ 已儲存':'儲存失敗';
}

// ── 渲染 ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(s){
  if(!sq||!s)return s;
  const re=new RegExp(sq.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return s.replace(re,m=>`<mark>${m}</mark>`);
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function ea(b){
  if(!isEdit)return '';
  return `contenteditable="true" onkeydown="hkey(event)" `;
}
function ctrl(b,i){
  if(!isEdit)return '';
  return `<div class="bc">
    <button class="cb" onclick="mv(${i},-1)" title="上移">↑</button>
    <button class="cb" onclick="mv(${i},1)" title="下移">↓</button>
    <button class="cb dl" onclick="del(${i})" title="刪除">✕</button>
  </div>`;
}

function render(){
  const cw=document.getElementById('cw');
  if(!blocks.length){
    cw.innerHTML=`<div class="empty-st"><div class="ei">📋</div><h3>尚無內容</h3><p>${isEdit?'點上方按鈕新增第一個區塊':'請聯絡管理員新增內容'}</p></div>`;
    return;
  }
  let h='',stepN=0,inSec=false;
  blocks.forEach((b,i)=>{
    const tx=hl(esc(b.text||''));
    if(b.type==='h1'){
      if(inSec)h+='</div>';
      h+=`<div class="psec" id="sec-${b.id}">`;
      inSec=true;stepN=0;

// ── 導覽 ── 修正版
function buildNav(){
  const nav=document.getElementById('sn');
  const h1s=blocks.filter(b=>b.type==='h1');
  if(!h1s.length){nav.innerHTML='<div style="padding:12px 14px;font-size:12px;color:#8E8E93">尚無內容</div>';return;}
  let h='<div class="snl">目錄</div>';
  h1s.forEach(h1=>{
    const h1i=blocks.indexOf(h1);
    const nxi=blocks.findIndex((b,i)=>i>h1i&&b.type==='h1');
    const h2s=blocks.filter((b,i)=>b.type==='h2'&&i>h1i&&(nxi<0||i<nxi));
    h+=`<div class="si" data-id="${h1.id}" onclick="jmp('${h1.id}',this)">
      <span style="flex-shrink:0">📌</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(h1.text)}</span>
      ${h2s.length?'<span class="ar">›</span>':''}
    </div>`;
    if(h2s.length){
      h+=`<div class="sc">`;
      h2s.forEach(h2=>{
        h+=`<div class="sci" data-id="${h2.id}" onclick="jmp2('${h2.id}',this)">📂 ${esc(h2.text)}</div>`;
      });
      h+=`</div>`;
    }
  });
  nav.innerHTML=h;
}

function jmp(id,el){
  if(isEdit)return;
  // 展開/收合子項
  const ch=el.nextElementSibling;
  if(ch&&ch.classList.contains('sc')){
    el.classList.toggle('open');
    ch.classList.toggle('open');
  }
  scrollTo(id);
  document.querySelectorAll('.si').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  if(window.innerWidth<=768)toggleSb();
}

function jmp2(id,el){
  if(isEdit)return;
  scrollTo(id);
  document.querySelectorAll('.sci').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  if(window.innerWidth<=768)toggleSb();
}

function scrollTo(id){
  // H1 段落用 sec- 前綴，H2 直接用 sec- 前綴（在 bw 上）
  const t=document.getElementById('sec-'+id);
  if(t)t.scrollIntoView({behavior:'smooth',block:'start'});
}

function addBlock(type){
  if(type==='img'){openImg(null);return;}
  syncDOM();
  const placeholder={h1:'大標題名稱',h2:'副標題',h3:'小標題',step:'在這裡輸入步驟說明',note:'在這裡輸入注意事項'}[type]||'';
  const b={id:uid(),type,text:placeholder};
  blocks.push(b);
  render();buildNav();
  setTimeout(()=>{
    const e=document.getElementById('t-'+b.id);
    if(e){e.focus();const r=document.createRange();r.selectNodeContents(e);window.getSelection().removeAllRanges();window.getSelection().addRange(r);}
  },60);
}
function mv(i,d){syncDOM();const j=i+d;if(j<0||j>=blocks.length)return;[blocks[i],blocks[j]]=[blocks[j],blocks[i]];render();buildNav();}
function del(i){if(!confirm('確定刪除？'))return;syncDOM();blocks.splice(i,1);render();buildNav();}

// ── 圖片上傳 ──
function openImg(bid){
  imgBid=bid;upUrl='';
  document.getElementById('ic').value='';
  document.getElementById('ui').innerHTML='<div class="uai">📷</div><p>點擊或拖曳圖片到這裡</p><p style="font-size:11px;margin-top:4px;color:#aaa">JPG、PNG、GIF，最大 10MB</p>';
  document.getElementById('us').textContent='';
  if(bid){const b=blocks.find(x=>x.id===bid);if(b)document.getElementById('ic').value=b.text||'';}
  document.getElementById('img-modal').style.display='';
}
function closeImg(){document.getElementById('img-modal').style.display='none';imgBid=null;upUrl='';}
function confirmImg(){
  if(!upUrl){toast('⚠️ 請先上傳圖片');return;}
  const cap=document.getElementById('ic').value.trim();
  syncDOM();
  if(imgBid){const b=blocks.find(x=>x.id===imgBid);if(b){b.url=upUrl;b.text=cap;}}
  else blocks.push({id:uid(),type:'img',url:upUrl,text:cap});
  closeImg();render();buildNav();
}
async function handleFile(input){if(input.files[0])await procImg(input.files[0]);}
async function handleDrop(e){
  e.preventDefault();document.getElementById('ua').style.borderColor='';
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/'))await procImg(f);
}
async function procImg(file){
  if(file.size>10*1024*1024){toast('⚠️ 圖片不能超過 10MB');return;}
  const ui=document.getElementById('ui'),us=document.getElementById('us');
  ui.innerHTML='<div class="sp"></div>';us.textContent='上傳中…';
  try{
    const fd=new FormData();fd.append('file',file);fd.append('upload_preset',CFG.PRE);fd.append('folder','sop-system');
    const r=await fetch(`https://api.cloudinary.com/v1_1/${CFG.CLD}/image/upload`,{method:'POST',body:fd});
    if(!r.ok)throw 0;
    const j=await r.json();upUrl=j.secure_url;
    ui.innerHTML=`<img src="${upUrl}" class="upr" alt="預覽">`;
    us.textContent='✅ 上傳成功';toast('✅ 圖片上傳成功');
  }catch{
    ui.innerHTML='<div class="uai">📷</div><p>點擊或拖曳圖片到這裡</p>';
    us.textContent='❌ 上傳失敗';toast('❌ 圖片上傳失敗');
  }
}
