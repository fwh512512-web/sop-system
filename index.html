<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路境行旅 知識庫</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
:root{
  --bg:#F7F6F3;--surface:#fff;--sbbg:#1C1C1E;--sbtext:#E5E5E7;
  --sbmuted:#8E8E93;--sbhover:#2C2C2E;--sbactive:#3A3A3C;
  --accent:#4A7C59;--accentl:#E8F2EC;--accenth:#3D6B4A;
  --text:#1C1C1E;--muted:#6E6E73;--border:#E5E5E7;--borders:#C7C7CC;
  --danger:#FF3B30;--warnbg:#FFFBEB;--warnbr:#F59E0B;
  --font:'Noto Sans TC',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* Sidebar */
#sidebar{width:260px;background:var(--sbbg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .25s}
.sh{padding:18px 16px 14px;border-bottom:1px solid #2C2C2E}
.sh-logo{font-size:14px;font-weight:700;color:#fff}
.sh-sub{font-size:11px;color:var(--sbmuted);margin-top:2px}
.ss{padding:10px 12px;border-bottom:1px solid #2C2C2E}
.ss input{width:100%;background:#2C2C2E;border:1px solid #3A3A3C;border-radius:6px;color:var(--sbtext);font-family:var(--font);font-size:13px;padding:6px 10px;outline:none}
.ss input:focus{border-color:var(--accent)}
.sn{flex:1;overflow-y:auto;padding:6px 0}
.sn::-webkit-scrollbar{width:3px}
.sn::-webkit-scrollbar-thumb{background:#3A3A3C}
.snl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--sbmuted);text-transform:uppercase;padding:14px 14px 4px}
.si{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:13px;color:var(--sbtext);cursor:pointer;border-left:3px solid transparent}
.si:hover{background:var(--sbhover)}
.si.active{background:var(--sbactive);color:#fff;border-left-color:var(--accent)}
.si .ar{margin-left:auto;font-size:11px;color:var(--sbmuted);transition:transform .18s}
.si.open .ar{transform:rotate(90deg)}
.sc{display:none}
.sc.open{display:block}
.sci{display:flex;align-items:center;gap:6px;padding:6px 14px 6px 32px;font-size:12px;color:var(--sbmuted);cursor:pointer;border-left:3px solid transparent}
.sci:hover{color:var(--sbtext);background:var(--sbhover)}
.sci.active{color:#A8D5B5;border-left-color:var(--accent)}
.sf{padding:12px;border-top:1px solid #2C2C2E}
.seb{width:100%;padding:8px;background:transparent;border:1px solid #3A3A3C;border-radius:6px;color:var(--sbmuted);font-family:var(--font);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.seb:hover{border-color:var(--accent);color:#A8D5B5}
.seb.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* Main */
#main{margin-left:260px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.tb{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:50px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.tb-cr{font-size:13px;color:var(--muted)}
.tb-cr b{color:var(--text)}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.svind{font-size:12px;color:var(--muted);display:none}
#banner{display:none;background:var(--accentl);border-bottom:1px solid #C5DFC9;padding:8px 32px;font-size:13px;color:var(--accent);align-items:center;gap:8px}
#banner button{margin-left:auto;background:none;border:none;color:var(--accent);cursor:pointer;font-size:16px}

/* Editor bar */
#ebar{display:none;background:var(--surface);border-bottom:2px solid var(--accentl);position:sticky;top:50px;z-index:49;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.et{padding:10px 32px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.et .lbl{font-size:11px;font-weight:600;color:var(--muted);margin-right:4px}
.ab{padding:5px 12px;border-radius:6px;border:1px solid var(--borders);background:var(--bg);color:var(--text);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.ab:hover{border-color:var(--accent);color:var(--accent)}
.bdg{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:700}
.bh1{background:#E8F2EC;color:#2D6A40}.bh2{background:#E8EEFF;color:#3A5FC8}
.bh3{background:#F3F3F3;color:#555}.bst{background:#EDFFF3;color:#1A7A3C}
.bnt{background:#FFFBEB;color:#92610A}.bim{background:#F0F0FF;color:#5856D6}
.eh{padding:6px 32px 10px;font-size:11px;color:#999}

/* Content */
.cw{padding:36px 48px;max-width:820px;width:100%}
[contenteditable]{outline:none;border-radius:4px}
[contenteditable]:focus{background:rgba(74,124,89,.07);box-shadow:0 0 0 2px rgba(74,124,89,.25)}
.bw{display:flex;align-items:flex-start;margin:1px 0}
.bc{display:none;align-items:center;flex-shrink:0;margin-top:3px}
.bw:hover .bc{display:flex}
.cb{background:none;border:none;cursor:pointer;width:22px;height:22px;border-radius:4px;color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center}
.cb:hover{background:var(--bg);color:var(--text)}
.cb.dl:hover{background:#FFF0EF;color:var(--danger)}
.vh1{font-size:24px;font-weight:700;padding:2px 6px;min-height:36px;flex:1;white-space:pre-wrap}
.vh1line{height:3px;background:linear-gradient(90deg,var(--accent),transparent);border-radius:2px;margin:2px 0 18px 6px}
.vh2wrap{display:flex;align-items:center;gap:8px;margin-top:22px;margin-bottom:6px;flex:1}
.vh2bar{width:4px;height:17px;background:var(--accent);border-radius:2px;flex-shrink:0}
.vh2{font-size:16px;font-weight:600;color:#2D6A40;padding:2px 6px;min-height:26px;flex:1;white-space:pre-wrap}
.vh3{font-size:14px;font-weight:600;padding:2px 6px 2px 28px;min-height:24px;margin-top:10px;flex:1;white-space:pre-wrap;position:relative}
.vh3::before{content:'◆';position:absolute;left:12px;top:5px;font-size:7px;color:var(--borders)}
.vstw{display:flex;align-items:flex-start;gap:10px;padding:4px 0;flex:1}
.vsn{min-width:22px;height:22px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.vst{font-size:14px;line-height:1.7;padding:1px 4px;flex:1;min-height:24px;white-space:pre-wrap}
.vntw{display:flex;align-items:flex-start;gap:8px;background:var(--warnbg);border-left:3px solid var(--warnbr);padding:10px 14px;border-radius:0 6px 6px 0;margin:6px 0;flex:1}
.vnt{font-size:13px;color:#78580A;flex:1;padding:1px 4px;min-height:22px;white-space:pre-wrap}
.vimw{margin:10px 0;flex:1}
.vimw figure{border:1px solid var(--border);border-radius:8px;overflow:hidden;max-width:580px}
.vimw img{width:100%;display:block}
.vimw figcaption{font-size:12px;color:var(--muted);padding:6px 12px;background:var(--bg);border-top:1px solid var(--border)}

/* Insert bar */
.ib{display:none;align-items:center;gap:6px;padding:2px 0}
.bw:hover+.ib,.ib:hover{display:flex}
.il{flex:1;height:1px;background:var(--accent);opacity:.25}
.ibtn{padding:2px 9px;border-radius:10px;background:var(--accentl);color:var(--accent);border:1px solid #C5DFC9;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.ibtn:hover{background:var(--accent);color:#fff}

/* Save float */
.svf{position:fixed;bottom:24px;right:24px;padding:10px 20px;border-radius:20px;background:#ccc;color:#fff;border:none;font-family:var(--font);font-size:14px;font-weight:600;cursor:default;opacity:.5;z-index:150;transition:all .3s}
.svf.on{background:var(--accent);cursor:pointer;opacity:1;box-shadow:0 4px 16px rgba(74,124,89,.4)}
.svf.on:hover{background:var(--accenth)}

/* Misc */
mark{background:#FFE066;border-radius:2px}
.est{text-align:center;padding:80px 20px;color:var(--muted)}
.est .i{font-size:40px;margin-bottom:12px}
.est h3{font-size:16px;margin-bottom:6px;color:var(--text)}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.mdl{background:var(--surface);border-radius:12px;padding:24px;width:100%;max-width:420px}
.mdl h3{font-size:15px;margin-bottom:14px}
.mdl label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px}
.mdl input{width:100%;padding:9px 12px;border:1px solid var(--borders);border-radius:7px;font-family:var(--font);font-size:14px;background:var(--bg);outline:none;margin-bottom:10px}
.mdl input:focus{border-color:var(--accent);background:var(--surface)}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn{padding:7px 16px;border-radius:6px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none}
.bp{background:var(--accent);color:#fff}.bp:hover{background:var(--accenth)}
.bgh{background:none;color:var(--muted);border:1px solid var(--borders)}
.perr{color:var(--danger);font-size:12px;margin:-6px 0 8px;display:none}
.ua{border:2px dashed var(--borders);border-radius:8px;padding:24px;text-align:center;cursor:pointer;background:var(--bg);margin-bottom:8px}
.ua:hover{border-color:var(--accent);background:var(--accentl)}
.ua p{font-size:13px;color:var(--muted);margin-top:6px}
.upr{max-width:100%;max-height:140px;border-radius:6px;border:1px solid var(--border)}
.ust{font-size:12px;color:var(--muted);margin-bottom:8px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1C1C1E;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:999;display:none;white-space:nowrap}
.hbg{display:none;position:fixed;top:10px;left:10px;z-index:300;background:var(--sbbg);border:none;color:#fff;width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:17px;align-items:center;justify-content:center}
.sp{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .cw{padding:20px}
  .tb{padding:0 16px 0 52px}
  .et,.eh{padding-left:16px;padding-right:16px}
  #banner{padding:8px 16px}
  .hbg{display:flex}
}
@media print{#sidebar,.tb,.hbg,#ebar,.svf,#banner{display:none!important}#main{margin-left:0}}
</style>
</head>
<body>
<button class="hbg" onclick="tSb()">☰</button>
<nav id="sidebar">
  <div class="sh"><div class="sh-logo">路境行旅文化館</div><div class="sh-sub">知識庫</div></div>
  <div class="ss"><input type="text" id="si" placeholder="🔍 搜尋關鍵字…" oninput="doSearch(this.value)"></div>
  <div class="sn" id="sn"></div>
  <div class="sf"><button class="seb" id="ebt" onclick="tEdit()">✏️ <span id="ebl">進入編輯模式</span></button></div>
</nav>
<div id="main">
  <div class="tb">
    <div class="tb-cr" id="crumb">路境行旅 <b>知識庫</b></div>
    <div class="tb-r"><span class="svind" id="svind"></span></div>
  </div>
  <div id="banner"><span>🔍</span><span id="bt"></span><button onclick="clrSearch()">✕</button></div>
  <div id="ebar">
    <div class="et">
      <span class="lbl">新增到頁尾：</span>
      <button class="ab" onclick="addEnd('h1')"><span class="bdg bh1">大標</span>大標題</button>
      <button class="ab" onclick="addEnd('h2')"><span class="bdg bh2">副標</span>副標題</button>
      <button class="ab" onclick="addEnd('h3')"><span class="bdg bh3">小標</span>小標題</button>
      <button class="ab" onclick="addEnd('step')"><span class="bdg bst">步驟</span>步驟</button>
      <button class="ab" onclick="addEnd('note')"><span class="bdg bnt">注意</span>注意事項</button>
      <button class="ab" onclick="addEnd('img')"><span class="bdg bim">圖</span>圖片</button>
    </div>
    <div class="eh">💡 直接點文字修改｜滑鼠移到區塊間可插入新區塊｜↑↓調順序｜✕刪除｜改完記得按右下角儲存</div>
  </div>
  <div class="cw" id="cw"><div style="text-align:center;padding:60px;color:#999"><div class="sp"></div>載入中…</div></div>
</div>
<div id="pm" style="display:none"><div class="mb"><div class="mdl">
  <h3>🔒 進入編輯模式</h3>
  <label>密碼</label>
  <input type="password" id="pi" onkeydown="if(event.key==='Enter')ckP()">
  <div class="perr" id="pe">密碼錯誤</div>
  <div class="mbtns"><button class="btn bgh" onclick="clP()">取消</button><button class="btn bp" onclick="ckP()">確認</button></div>
</div></div></div>
<div id="im" style="display:none"><div class="mb"><div class="mdl">
  <h3>🖼️ 上傳圖片</h3>
  <label>說明文字（選填）</label>
  <input type="text" id="ic">
  <label>選擇圖片</label>
  <div class="ua" onclick="document.getElementById('fi').click()" ondragover="event.preventDefault()" ondrop="hDrop(event)">
    <div id="ui"><div style="font-size:28px">📷</div><p>點擊或拖曳圖片到這裡（最大10MB）</p></div>
  </div>
  <div class="ust" id="us"></div>
  <input type="file" id="fi" accept="image/*" style="display:none" onchange="hFile(this)">
  <div class="mbtns"><button class="btn bgh" onclick="clI()">取消</button><button class="btn bp" onclick="okI()">插入</button></div>
</div></div></div>
<button class="svf" id="svf" onclick="doSave()">💾 儲存</button>
<div id="toast"></div>
<script>
var CFG={
  BIN:'6a603f6cf5f4af5e29af2fa1',
  KEY:'$2a$10$gMxDaF3CQfAsAvbqEQpgDOmNNFmz9CXKzA7pgg0u2Lb0pMkrxVQAW',
  CLD:'db1pzd5xq',PRE:'sop_upload',PWD:'1234'
};
var blocks=[],isEdit=false,curPage=null,sq='',imgBid=null,upUrl='',insAt;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(s){if(!sq||!s)return s;try{var re=new RegExp(sq.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\\\$&'),'gi');return s.replace(re,function(m){return '<mark>'+m+'</mark>';});}catch(e){return s;}}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(t._x);t._x=setTimeout(function(){t.style.display='none';},2600);}
function tSb(){document.getElementById('sidebar').classList.toggle('open');}
function syncDOM(){blocks.forEach(function(b){var e=document.getElementById('t-'+b.id);if(e&&typeof e.innerText==='string')b.text=e.innerText.trim();});}

/* ── 初始化 ── */
function init(){
  blocks=defData();
  buildNav();
  var f=firstH1();
  if(f)goPage(f.id);else render();
  setTimeout(loadRemote,400);
}
function firstH1(){for(var i=0;i<blocks.length;i++)if(blocks[i].type==='h1')return blocks[i];return null;}
function loadRemote(){
  fetch('https://api.jsonbin.io/v3/b/'+CFG.BIN+'/latest',{headers:{'X-Master-Key':CFG.KEY}})
  .then(function(r){if(!r.ok)throw 0;return r.json();})
  .then(function(j){
    var rm=(j.record&&j.record.blocks)||[];
    rm=rm.filter(function(b){return b&&b.id&&b.type;});
    if(rm.length>0){
      blocks=rm;buildNav();
      var f=firstH1();
      if(f)goPage(f.id);
      toast('✅ 已同步最新資料');
    }
  })
  .catch(function(){});
}

/* ── 儲存 ── */
function doSave(){
  if(!isEdit){toast('⚠️ 請先進入編輯模式');return;}
  saveNow();
}
function saveNow(){
  syncDOM();
  var el=document.getElementById('svind');
  el.style.display='inline';el.style.color='#4A7C59';el.textContent='儲存中…';
  fetch('https://api.jsonbin.io/v3/b/'+CFG.BIN,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':CFG.KEY},
    body:JSON.stringify({blocks:blocks})
  })
  .then(function(r){if(!r.ok)throw 0;
    el.style.color='#2D7D46';el.textContent='✓ 已儲存';
    toast('✅ 已儲存');
    dirty=false;
  })
  .catch(function(){
    el.style.color='#FF3B30';el.textContent='儲存失敗';
    toast('❌ 儲存失敗，請檢查網路後重試');
  });
}

/* ── 頁面 ── */
function goPage(id){
  curPage=id;
  var items=document.querySelectorAll('.si');
  for(var i=0;i<items.length;i++)items[i].classList.remove('active');
  var ni=document.querySelector('.si[data-id="'+id+'"]');
  if(ni){
    ni.classList.add('active');
    var ch=ni.nextElementSibling;
    if(ch&&ch.classList.contains('sc')){ni.classList.add('open');ch.classList.add('open');}
  }
  var b=findBlock(id);
  if(b)document.getElementById('crumb').innerHTML='路境行旅 <b>'+esc(b.text)+'</b>';
  render();
  window.scrollTo(0,0);
}
function findBlock(id){for(var i=0;i<blocks.length;i++)if(blocks[i].id===id)return blocks[i];return null;}
function pageRange(){
  if(!curPage)return[0,0];
  var s=-1;
  for(var i=0;i<blocks.length;i++)if(blocks[i].id===curPage){s=i;break;}
  if(s<0)return[0,0];
  var e=blocks.length;
  for(var j=s+1;j<blocks.length;j++)if(blocks[j].type==='h1'){e=j;break;}
  return[s,e];
}

/* ── 渲染 ── */
function ctrls(i){
  if(!isEdit)return '';
  return '<div class="bc">'
    +'<button class="cb" onclick="mvUp('+i+')" title="上移">↑</button>'
    +'<button class="cb" onclick="mvDn('+i+')" title="下移">↓</button>'
    +'<button class="cb dl" onclick="delB('+i+')" title="刪除">✕</button>'
    +'</div>';
}
function insBar(i){
  if(!isEdit)return '';
  return '<div class="ib"><div class="il"></div>'
    +'<button class="ibtn" onclick="insB(\'h2\','+i+')">＋副標</button>'
    +'<button class="ibtn" onclick="insB(\'h3\','+i+')">＋小標</button>'
    +'<button class="ibtn" onclick="insB(\'step\','+i+')">＋步驟</button>'
    +'<button class="ibtn" onclick="insB(\'note\','+i+')">＋注意</button>'
    +'<button class="ibtn" onclick="insB(\'img\','+i+')">＋圖片</button>'
    +'<div class="il"></div></div>';
}
function edAttr(){return isEdit?'contenteditable="true" onkeydown="kd(event)" oninput="dirty=true" ':'';}
function kd(e){if(e.key==='Enter'&&!e.shiftKey)e.preventDefault();}

function render(){
  var cw=document.getElementById('cw');
  if(sq){renderSearch(cw);return;}
  if(!curPage){cw.innerHTML='<div class="est"><div class="i">📋</div><h3>請從左側選擇主題</h3></div>';return;}
  var r=pageRange(),s=r[0],e=r[1];
  if(e-s<=0){cw.innerHTML='<div class="est"><div class="i">📋</div><h3>此頁尚無內容</h3></div>';return;}
  var h='',sn=0;
  for(var i=s;i<e;i++){
    var b=blocks[i];
    var tx=hl(esc(b.text||''));
    if(b.type==='h1'){
      sn=0;
      h+='<div class="bw">'+ctrls(i)+'<div style="flex:1"><div '+edAttr()+'class="vh1" id="t-'+b.id+'">'+tx+'</div><div class="vh1line"></div></div></div>'+insBar(i);
    }else if(b.type==='h2'){
      sn=0;
      h+='<div class="bw" id="sec-'+b.id+'" style="scroll-margin-top:120px">'+ctrls(i)+'<div class="vh2wrap"><div class="vh2bar"></div><div '+edAttr()+'class="vh2" id="t-'+b.id+'">'+tx+'</div></div></div>'+insBar(i);
    }else if(b.type==='h3'){
      h+='<div class="bw">'+ctrls(i)+'<div '+edAttr()+'class="vh3" id="t-'+b.id+'">'+tx+'</div></div>'+insBar(i);
    }else if(b.type==='step'){
      sn++;

function renderSearch(cw){
  var m=[];
  for(var i=0;i<blocks.length;i++){
    var b=blocks[i];
    if((b.text||'').toLowerCase().indexOf(sq)>=0)m.push(i);
  }
  if(!m.length){cw.innerHTML='<div class="est"><div class="i">🔍</div><h3>找不到「'+esc(sq)+'」</h3></div>';return;}
  var h='',lastH1='';
  for(var k=0;k<m.length;k++){
    var i=m[k],b=blocks[i],tx=hl(esc(b.text||''));
    var h1=null;
    for(var j=i;j>=0;j--)if(blocks[j].type==='h1'){h1=blocks[j];break;}
    if(h1&&h1.text!==lastH1){
      h+='<div style="font-size:11px;color:#4A7C59;font-weight:600;margin:16px 0 6px;cursor:pointer" onclick="clrSearch();goPage(\''+h1.id+'\')">📌 '+esc(h1.text)+' ›</div>';
      lastH1=h1.text;
    }
    if(b.type==='h2')h+='<div class="bw"><div class="vh2wrap"><div class="vh2bar"></div><div class="vh2">'+tx+'</div></div></div>';
    else if(b.type==='h3')h+='<div class="bw"><div class="vh3">'+tx+'</div></div>';
    else if(b.type==='step')h+='<div class="bw"><div class="vstw"><div class="vsn">•</div><div class="vst">'+tx+'</div></div></div>';
    else if(b.type==='note')h+='<div class="bw"><div class="vntw"><span>⚠️</span><div class="vnt">'+tx+'</div></div></div>';
    else if(b.type==='h1')h+='';
  }
  cw.innerHTML=h;
}

/* ── 導覽 ── */
function buildNav(){
  var nav=document.getElementById('sn');
  var h='';
  var hasH1=false;
  for(var i=0;i<blocks.length;i++){
    if(blocks[i].type!=='h1')continue;
    hasH1=true;
    var h1=blocks[i];
    var subs=[];
    for(var j=i+1;j<blocks.length;j++){
      if(blocks[j].type==='h1')break;
      if(blocks[j].type==='h2')subs.push(blocks[j]);
    }
    h+='<div class="si" data-id="'+h1.id+'" onclick="navClick(\''+h1.id+'\',this)">'
      +'<span>📌</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(h1.text)+'</span>'
      +(subs.length?'<span class="ar">›</span>':'')+'</div>';
    if(subs.length){
      h+='<div class="sc">';
      for(var k=0;k<subs.length;k++){
        h+='<div class="sci" onclick="subClick(\''+subs[k].id+'\',\''+h1.id+'\',this)">📂 '+esc(subs[k].text)+'</div>';
      }
      h+='</div>';
    }
  }
  nav.innerHTML=hasH1?'<div class="snl">目錄</div>'+h:'<div style="padding:12px 14px;font-size:12px;color:#8E8E93">尚無內容</div>';
}
function navClick(id,el){
  var ch=el.nextElementSibling;
  if(ch&&ch.classList.contains('sc')){el.classList.toggle('open');ch.classList.toggle('open');}
  if(sq)clrSearch();
  goPage(id);
  if(window.innerWidth<=768)tSb();
}
function subClick(h2id,h1id,el){
  if(sq)clrSearch();
  goPage(h1id);
  setTimeout(function(){
    var t=document.getElementById('sec-'+h2id);
    if(t)t.scrollIntoView({behavior:'smooth',block:'start'});
  },120);
  var scis=document.querySelectorAll('.sci');
  for(var i=0;i<scis.length;i++)scis[i].classList.remove('active');
  el.classList.add('active');
  if(window.innerWidth<=768)tSb();
}

/* ── 區塊操作 ── */
function addEnd(type){
  if(type==='img'){insAt=undefined;opI(null);return;}
  syncDOM();
  var r=pageRange(),e=r[1];
  var ph={h1:'新主題名稱',h2:'副標題',h3:'小標題',step:'步驟說明',note:'注意事項'}[type];
  var b={id:uid(),type:type,text:ph};
  if(type==='h1'){
    blocks.splice(e,0,b);
    buildNav();goPage(b.id);
  }else{
    blocks.splice(e,0,b);
    render();
  }
  dirty=true;
  focusB(b.id);
}
function insB(type,after){
  if(type==='img'){insAt=after;opI(null);return;}
  syncDOM();
  var ph={h2:'副標題',h3:'小標題',step:'步驟說明',note:'注意事項'}[type];
  var b={id:uid(),type:type,text:ph};
  blocks.splice(after+1,0,b);
  dirty=true;
  render();buildNav();
  focusB(b.id);
}
function focusB(id){
  setTimeout(function(){
    var e=document.getElementById('t-'+id);
    if(e){
      e.focus();
      var r=document.createRange();
      r.selectNodeContents(e);
      var s=window.getSelection();
      s.removeAllRanges();s.addRange(r);
    }
  },80);
}
function mvUp(i){
  syncDOM();
  if(i<=0)return;
  var b=blocks[i],p=blocks[i-1];
  if(p.type==='h1'&&b.type!=='h1')return;
  blocks[i]=p;blocks[i-1]=b;
  dirty=true;
  render();buildNav();
}
function mvDn(i){
  syncDOM();
  if(i>=blocks.length-1)return;
  var b=blocks[i],n=blocks[i+1];
  if(b.type!=='h1'&&n.type==='h1')return;
  if(b.type==='h1')return;
  blocks[i]=n;blocks[i+1]=b;
  dirty=true;
  render();buildNav();
}
function delB(i){
  if(!confirm('確定刪除？'))return;
  syncDOM();
  var b=blocks[i];
  blocks.splice(i,1);
  dirty=true;
  if(b.type==='h1'&&b.id===curPage){
    var f=firstH1();
    buildNav();
    if(f)goPage(f.id);
    else{curPage=null;render();}
  }else{
    render();buildNav();
  }
}

/* ── 圖片 ── */
function opI(bid){
  imgBid=bid;upUrl='';
  document.getElementById('ic').value='';
  document.getElementById('ui').innerHTML='<div style="font-size:28px">📷</div><p>點擊或拖曳圖片到這裡（最大10MB）</p>';
  document.getElementById('us').textContent='';
  if(bid){var b=findBlock(bid);if(b)document.getElementById('ic').value=b.text||'';}
  document.getElementById('im').style.display='';
}
function clI(){document.getElementById('im').style.display='none';imgBid=null;upUrl='';insAt=undefined;}
function okI(){
  if(!upUrl){toast('⚠️ 請先上傳圖片');return;}
  var cap=document.getElementById('ic').value.trim();
  syncDOM();
  if(imgBid){
    var b=findBlock(imgBid);
    if(b){b.url=upUrl;b.text=cap;}
  }else{
    var nb={id:uid(),type:'img',url:upUrl,text:cap};
    if(insAt!==undefined){blocks.splice(insAt+1,0,nb);}
    else{var r=pageRange();blocks.splice(r[1],0,nb);}
  }
  dirty=true;
  clI();render();buildNav();
}
function hFile(inp){if(inp.files[0])upImg(inp.files[0]);}
function hDrop(e){e.preventDefault();var f=e.dataTransfer.files[0];if(f&&f.type.indexOf('image')===0)upImg(f);}
function upImg(file){
  if(file.size>10485760){toast('⚠️ 圖片不能超過10MB');return;}
  document.getElementById('ui').innerHTML='<div class="sp"></div>';
  document.getElementById('us').textContent='上傳中…';
  var fd=new FormData();
  fd.append('file',file);
  fd.append('upload_preset',CFG.PRE);
  fd.append('folder','sop-system');
  fetch('https://api.cloudinary.com/v1_1/'+CFG.CLD+'/image/upload',{method:'POST',body:fd})
  .then(function(r){if(!r.ok)throw 0;return r.json();})
  .then(function(j){
    upUrl=j.secure_url;
    document.getElementById('ui').innerHTML='<img src="'+upUrl+'" class="upr">';
    document.getElementById('us').textContent='✅ 上傳成功';
  })
  .catch(function(){
    document.getElementById('ui').innerHTML='<div style="font-size:28px">📷</div><p>點擊或拖曳圖片到這裡</p>';
    document.getElementById('us').textContent='❌ 上傳失敗';
  });
}
